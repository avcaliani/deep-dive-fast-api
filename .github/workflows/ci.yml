name: fast-app-api CI

# Trigger: Push and Pull targeting Main Branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Available GitHub Actions
# https://github.com/marketplace?type=actions
jobs:

  lint:
    name: Lint
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7
      - uses: pre-commit/action@v3.0.1

  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest -sx
