# Used in CI/CD pipelines to run pre-commit hooks on the codebase
# See https://pre-commit.com for more information.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: debug-statements
      - id: trailing-whitespace
        args: [ --markdown-linebreak-ext=md ]
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: check-ast
      - id: fix-byte-order-marker
      - id: check-json
      - id: check-symlinks
      - id: check-vcs-permalinks
      - id: check-xml
      - id: check-toml
      - id: check-yaml
      - id: detect-aws-credentials
        args: [ "--allow-missing-credentials" ]
      - id: detect-private-key
      - id: forbid-new-submodules
      - id: no-commit-to-branch
        args: [ -b, main ]
      - id: end-of-file-fixer
  - repo: local
    hooks:
      - id: check-datetime-now
        name: check_datetime_now
        description: Prefer timezone-aware datetime.now(timezone.utc)
        language: pygrep
        entry: 'datetime\.now\(\)'
        types: [ python ]
  - repo: https://github.com/twu/skjold
    rev: v0.6.2
    hooks:
      - id: skjold
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: "uv.lock|.*.ipynb"
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-mock-methods
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        additional_dependencies: [ "toml" ]
        args: [ --add-ignore=D1, -e ]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff-check
        args: [ --fix ]
      - id: ruff-format
