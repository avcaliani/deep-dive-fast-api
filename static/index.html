<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
    <title>Duff API</title>
    <style>
        body {
            background: white;
            color: black;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            text-decoration: none;
        }

        #logo {
            font-size: 4em;
            margin: 3em auto 0 auto;
            display: block;
        }

        #github {
            display: block;
            font-size: 1.5em;
            margin-bottom: 1em;
        }

        #footer {
            width: 100%;
            bottom: 0;
            left: 0;
            padding: 5em 0px;
        }

        #footer, #footer > a {
            font-size: x-small;
            color: gray;

        }

        h1 {
            margin-bottom: 0;
        }

        h3 {
            color: #7ACED7;
            margin-top: .5em;
        }

        p, p > a {
            font-size: small;
            color: gray;
        }

        p > a:hover {
            color: #7ACED7;
        }

        #clock {
            color: #7ACED7;
            font-size: small;
        }
    </style>
</head>

<body>
<div>
    <span id="logo">🍻</span>
    <h1>Duff</h1>
    <h3>API</h3>
    <p>
        <a href="/docs">Swagger</a> | <a href="/redoc">ReDoc</a>
    </p>
    <span id="clock">...</span>
</div>
<div id="footer">
    <a id="github" href="https://github.com/avcaliani">🐙</a>
</div>
</body>

<script type="application/javascript">
    const span = document.getElementById('clock');
    setInterval(
        () => span.textContent = new Date().toLocaleString().replace(",", " -"),
        1000
    );
</script>
</html>
